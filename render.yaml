services:
  - type: web
    name: al-imra-academic-services
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: DOCUMENT_STORAGE_DIR
        value: /opt/render/project/src/server/storage/documents
